# ===== Application =====
spring.application.name=SafetyDesk
server.port=9090

# ===== MySQL Database Connection =====
spring.datasource.url=jdbc:mysql://localhost:3306/safetydesk?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== Hibernate / JPA =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===== Logging =====
logging.level.com.cts=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# ===== JWT (Story 10) =====
# HS256 shared secret. MUST be at least 32 bytes for HS256.
# In production this comes from an env var / secrets manager, NOT committed.
safetydesk.jwt.secret=ChangeThisToALongRandomSecretOfAtLeast32BytesForHS256Signing!!
# Access token validity in milliseconds (8 hours, configurable - Story 51 default)
safetydesk.jwt.access-expiration-ms=28800000
# Refresh token validity in milliseconds (7 days)
safetydesk.jwt.refresh-expiration-ms=604800000

# ===== Account lockout (Story 10 - "configurable number of failed attempts") =====
safetydesk.security.max-failed-attempts=5

# ===== Seed admin (so you are never locked out after security is enabled) =====
safetydesk.seed.admin-email=admin@safetydesk.com
safetydesk.seed.admin-password=Admin@12345

springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs